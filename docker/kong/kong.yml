_format_version: "3.0"

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
              methods:
                - GET
                - POST
                - OPTIONS
              headers:
                - Accept
                - Accept-Version
                - Content-Length
                - Content-MD5
                - Content-Type
                - Date
                - X-Auth-Token
                - x-player-id
                - Authorization
              exposed_headers:
                - Content-Length
                - Content-Type
              credentials: false
              max_age: 3600
              preflight_continue: false

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
              methods:
                - GET
                - POST
                - OPTIONS
              headers:
                - Accept
                - Accept-Version
                - Content-Length
                - Content-MD5
                - Content-Type
                - Date
                - X-Auth-Token
                - x-player-id
                - Authorization
              exposed_headers:
                - Content-Length
                - Content-Type
              credentials: false
              max_age: 3600
              preflight_continue: false
