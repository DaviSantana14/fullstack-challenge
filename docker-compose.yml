services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_EXTRA_DATABASES: games,wallets
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # RabbitMQ (with management UI)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak (Identity Provider)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r

            Host: localhost\r

            Connection: close\r

            \r

            ' >&3 && cat <&3 | grep -q '200'"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kong (API Gateway — DB-less / declarative)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong:/kong:ro
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Games Service
  # ---------------------------------------------------------------------------
  games:
    build:
      context: ./services/games
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./services/games/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4001/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Wallets Service
  # ---------------------------------------------------------------------------
  wallets:
    build:
      context: ./services/wallets
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    env_file:
      - ./services/wallets/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4002/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: http://localhost:4001
        NEXT_PUBLIC_ENABLE_DEV_TOOLS: "true"
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
        NEXT_PUBLIC_KEYCLOAK_REALM: crash-game
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: crash-game-client
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      ENABLE_DEV_TOOLS: "true"
      INTERNAL_GAMES_BASE_URL: http://games:4001
      INTERNAL_WALLETS_BASE_URL: http://wallets:4002
      INTERNAL_API_TOKEN: dev-internal-token
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: crash-game
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: crash-game-client
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      kong:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Seed — populate test wallet for player user
  # ---------------------------------------------------------------------------
  seed-wallets:
    image: curlimages/curl:8.12.1
    depends_on:
      wallets:
        condition: service_healthy
    command: >
      sh -c "
        curl -sf -X POST http://wallets:4002/internal/dev/fund
        -H 'X-Internal-Token: $$INTERNAL_API_TOKEN'
        -H 'Content-Type: application/json'
        -d '{\"playerId\":\"player\",\"amountInCents\":\"1000000\"}'
        && echo 'Seed: wallet player funded with R$ 10.000,00'
      "
    environment:
      INTERNAL_API_TOKEN: dev-internal-token
    restart: "no"

volumes:
  postgres_data:
  rabbitmq_data:
