name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare environment files
        run: |
          cp services/games/.env.example services/games/.env
          cp services/wallets/.env.example services/wallets/.env
          cp frontend/.env.example frontend/.env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck games
        working-directory: services/games
        run: bunx tsc -p tests/tsconfig.json --noEmit

      - name: Test games unit
        working-directory: services/games
        run: bun test tests/unit

      - name: Typecheck wallets
        working-directory: services/wallets
        run: bunx tsc --noEmit

      - name: Test wallets unit
        working-directory: services/wallets
        run: bun test tests/unit

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: bun test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare environment files
        run: |
          cp services/games/.env.example services/games/.env
          cp services/wallets/.env.example services/wallets/.env
          cp frontend/.env.example frontend/.env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start E2E stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build

      - name: Wait for services
        run: |
          set -euo pipefail

          wait_for_health() {
            local name="$1"
            local url="$2"

            for attempt in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$name is ready"
                return 0
              fi

              echo "Waiting for $name ($attempt/60)"
              sleep 5
            done

            echo "$name did not become ready"
            return 1
          }

          wait_for_health keycloak http://localhost:8080/realms/crash-game/.well-known/openid-configuration
          wait_for_health games http://localhost:4001/health
          wait_for_health wallets http://localhost:4002/health
          wait_for_health kong-games http://localhost:8000/games/health
          wait_for_health kong-wallets http://localhost:8000/wallets/health

      - name: Run games E2E tests
        working-directory: services/games
        run: bun test tests/e2e

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs games wallets postgres rabbitmq kong keycloak

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v --remove-orphans
